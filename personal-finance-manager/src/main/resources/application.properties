spring.application.name=PersonalFinanceManager

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console configuration (optional for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security configuration
# (Using default Spring Security settings for sessions, but we'll disable CSRF for API access)
